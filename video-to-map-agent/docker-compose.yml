services:

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-orchestrator
    restart: unless-stopped
    ports:
      - "8010:8010"   # Orchestrator agent port
      - "8090:8090"   # Built-in file server (PDF / Excel / map PNG downloads)
    env_file:
      - .env
    volumes:
      - map-output:/app/output
    depends_on:
      - transcript
      - location-extractor
      - geocoder-mapper
      - aggregator
      - trip-planner
      - weather-monitor
      - pdf-generator
      - excel-generator
    command: ["python", "orchestrator_agent.py"]
    networks:
      - agent-network

  transcript:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-transcript
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file:
      - .env
    command: ["python", "transcript_agent.py"]
    networks:
      - agent-network

  location-extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-location-extractor
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file:
      - .env
    command: ["python", "location_extractor_agent.py"]
    networks:
      - agent-network

  geocoder-mapper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-geocoder
    restart: unless-stopped
    ports:
      - "8007:8007"
    env_file:
      - .env
    command: ["python", "geocoder_mapper_agent.py"]
    networks:
      - agent-network

  weather-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-weather-monitor
    restart: unless-stopped
    ports:
      - "8008:8008"
    env_file:
      - .env
    command: ["python", "weather_monitor_agent.py"]
    networks:
      - agent-network

  pdf-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-pdf-generator
    restart: unless-stopped
    ports:
      - "8009:8009"
    env_file:
      - .env
    volumes:
      - map-output:/app/output
    command: ["python", "pdf_generator_agent.py"]
    networks:
      - agent-network

  trip-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-trip-planner
    restart: unless-stopped
    ports:
      - "8011:8011"
    env_file:
      - .env
    command: ["python", "trip_planner_agent.py"]
    networks:
      - agent-network

  excel-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-excel-generator
    restart: unless-stopped
    ports:
      - "8012:8012"
    env_file:
      - .env
    volumes:
      - map-output:/app/output
    command: ["python", "excel_generator_agent.py"]
    networks:
      - agent-network

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-map-aggregator
    restart: unless-stopped
    ports:
      - "8013:8013"
    env_file:
      - .env
    command: ["python", "aggregator_agent.py"]
    networks:
      - agent-network

volumes:
  map-output:

networks:
  agent-network:
    driver: bridge
