services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-orchestrator
    restart: unless-stopped
    ports:
      - "8050:8000"
    env_file:
      - .env
    volumes:
      - podcast-output:/app/output
    depends_on:
      - extractor
      - scriptwriter
      - voice-studio
      - host-a
      - host-b
    command: ["python", "orchestrator.py"]
    networks:
      - agent-network

  extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-extractor
    restart: unless-stopped
    ports:
      - "8051:8001"
    env_file:
      - .env
    command: ["python", "extractor_agent.py"]
    networks:
      - agent-network

  scriptwriter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-scriptwriter
    restart: unless-stopped
    ports:
      - "8052:8002"
    env_file:
      - .env
    command: ["python", "scriptwriter_agent.py"]
    networks:
      - agent-network

  voice-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-voice-studio
    restart: unless-stopped
    ports:
      - "8053:8003"
    env_file:
      - .env
    volumes:
      - podcast-output:/app/output
    command: ["python", "voice_studio_agent.py"]
    networks:
      - agent-network

  host-a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-host-a
    restart: unless-stopped
    ports:
      - "8054:8004"
    env_file:
      - .env
    command: ["python", "host_a_agent.py"]
    networks:
      - agent-network

  host-b:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-podcast-host-b
    restart: unless-stopped
    ports:
      - "8055:8005"
    env_file:
      - .env
    command: ["python", "host_b_agent.py"]
    networks:
      - agent-network

volumes:
  podcast-output:

networks:
  agent-network:
    driver: bridge
